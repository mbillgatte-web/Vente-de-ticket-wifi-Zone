<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - WiFi Zone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #2563EB;
            --color-primary-dark: #1E40AF;
            --color-primary-light: #DBEAFE;
            --color-success: #10B981;
            --color-success-dark: #059669;
            --color-gray-50: #F9FAFB;
            --color-gray-100: #F3F4F6;
            --color-gray-200: #E5E7EB;
            --color-gray-300: #D1D5DB;
            --color-gray-600: #4B5563;
            --color-gray-900: #111827;
            --color-white: #FFFFFF;
            --color-error: #EF4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--color-gray-50);
            color: var(--color-gray-900);
        }

        /* Header */
        header {
            background: var(--color-white);
            border-bottom: 1px solid var(--color-gray-200);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        /* Progress Bar */
        .progress-section {
            margin-bottom: 3rem;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .progress-step::after {
            content: '';
            position: absolute;
            top: 24px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--color-gray-300);
            z-index: 0;
            display: none;
        }

        .progress-step:not(:last-child)::after {
            display: block;
        }

        .progress-step:nth-child(1)::after,
        .progress-step:nth-child(2)::after {
            background: var(--color-primary);
        }

        .progress-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--color-gray-600);
            position: relative;
            z-index: 1;
            margin-bottom: 0.75rem;
        }

        .progress-step.active .progress-circle {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .progress-step.completed .progress-circle {
            background: var(--color-success);
            color: var(--color-white);
        }

        .progress-label {
            font-size: 0.9rem;
            color: var(--color-gray-600);
            font-weight: 500;
        }

        /* Main Content */
        .checkout-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .form-section {
            background: var(--color-white);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--color-gray-200);
        }

        .form-section h2 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--color-gray-900);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-gray-900);
            margin-bottom: 0.5rem;
        }

        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid var(--color-gray-300);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--color-white);
        }

        input[type="email"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }

        input::placeholder {
            color: var(--color-gray-300);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 0.25rem;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .checkbox-label {
            font-size: 0.9rem;
            color: var(--color-gray-600);
            margin: 0;
            cursor: pointer;
            line-height: 1.5;
        }

        .checkbox-label a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        /* Summary Card */
        .summary-card {
            background: var(--color-white);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--color-gray-200);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .summary-card h3 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--color-gray-900);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--color-gray-600);
        }

        .summary-item strong {
            color: var(--color-gray-900);
        }

        .summary-divider {
            border-top: 1px solid var(--color-gray-200);
            margin: 1rem 0;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .ticket-info {
            background: var(--color-gray-50);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--color-primary);
        }

        .ticket-info-title {
            font-size: 0.9rem;
            color: var(--color-gray-600);
            margin-bottom: 0.5rem;
        }

        .ticket-info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--color-gray-900);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-secondary {
            background: var(--color-gray-200);
            color: var(--color-gray-900);
        }

        .btn-secondary:hover {
            background: var(--color-gray-300);
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-white);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--color-primary-dark);
        }

        .btn-primary:disabled {
            background: var(--color-gray-300);
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Error Message */
        .error-message {
            background: #FEE2E2;
            color: var(--color-error);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                margin: 2rem auto;
            }

            .checkout-wrapper {
                grid-template-columns: 1fr;
            }

            .summary-card {
                position: static;
            }

            .button-group {
                flex-direction: column;
            }

            .progress-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .progress-step::after {
                display: none;
            }
        }

        @media (max-width: 375px) {
            .form-section,
            .summary-card {
                padding: 1rem;
            }

            .form-section h2 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">📡 WiFi Zone</div>
        <div style="color: var(--color-gray-600);">Étape 2 - Vos informations</div>
    </header>

    <div class="container">
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-step completed">
                    <div class="progress-circle">✓</div>
                    <div class="progress-label">Choix</div>
                </div>
                <div class="progress-step active">
                    <div class="progress-circle">2</div>
                    <div class="progress-label">Infos</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle">3</div>
                    <div class="progress-label">Paiement</div>
                </div>
            </div>
        </div>

        <div class="checkout-wrapper">
            <form class="form-section" id="checkoutForm">
                <h2>Vos informations</h2>

                <div class="error-message" id="errorMsg"></div>

                <div class="form-group">
                    <label for="email">Adresse email *</label>
                    <input type="email" id="email" name="email" placeholder="vous@exemple.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Numéro de téléphone *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+237 6XX XXX XXX" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="cgu" name="cgu" required>
                    <label for="cgu" class="checkbox-label">
                        J'accepte les <a href="#cgu">conditions générales d'utilisation</a>
                    </label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter" class="checkbox-label">
                        Me notifier des offres spéciales et promotions
                    </label>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="goBack()">← Retour</button>
                    <button type="submit" class="btn btn-primary" id="nextBtn">Continuer vers paiement →</button>
                </div>
            </form>

            <div class="summary-card">
                <h3>Récapitulatif</h3>

                <div class="ticket-info">
                    <div class="ticket-info-title">Forfait sélectionné</div>
                    <div class="ticket-info-value">WiFi 24 Heures</div>
                </div>

                <div class="summary-item">
                    <span>Forfait</span>
                    <strong>1 500 FCFA</strong>
                </div>

                <div class="summary-item">
                    <span>Frais (0%)</span>
                    <strong>0 FCFA</strong>
                </div>

                <div class="summary-divider"></div>

                <div class="summary-total">
                    <span>Total</span>
                    <span>1 500 FCFA</span>
                </div>

                <div style="font-size: 0.8rem; color: var(--color-gray-600); margin-top: 1rem; text-align: center;">
                    ✓ Paiement sécurisé<br>
                    ✓ Livraison instantanée
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('checkoutForm');
        const errorMsg = document.getElementById('errorMsg');
        const cguCheckbox = document.getElementById('cgu');
        const nextBtn = document.getElementById('nextBtn');

        // Validation email
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Validation téléphone
        function validatePhone(phone) {
            const re = /^\+?237\s?[67]\d{8}$/;
            return re.test(phone.replace(/\s/g, ''));
        }

        // Validation du formulaire
        function validateForm() {
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            errorMsg.classList.remove('show');

            if (!email) {
                showError('Veuillez entrer une adresse email');
                return false;
            }

            if (!validateEmail(email)) {
                showError('Email invalide');
                return false;
            }

            if (!phone) {
                showError('Veuillez entrer un numéro de téléphone');
                return false;
            }

            if (!validatePhone(phone)) {
                showError('Numéro de téléphone invalide (format: +237 6XX XXX XXX)');
                return false;
            }

            if (!cguCheckbox.checked) {
                showError('Vous devez accepter les conditions d\'utilisation');
                return false;
            }

            return true;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        // Soumission du formulaire
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (validateForm()) {
                alert('Redirecting to payment...');
                // window.location.href = '/payment';
            }
        });

        // Activer/désactiver le bouton
        document.getElementById('email').addEventListener('change', () => {
            nextBtn.disabled = !validateForm();
        });

        document.getElementById('phone').addEventListener('change', () => {
            nextBtn.disabled = !validateForm();
        });

        cguCheckbox.addEventListener('change', () => {
            nextBtn.disabled = !validateForm();
        });

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
